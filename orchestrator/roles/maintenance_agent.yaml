{
  "id": "maintenance_agent",
  "name": "Maintenance Agent",
  "description": "Performs safe upkeep: formatting, small refactors, docs updates, and local validation within constraints.",
  "responsibilities": [
    "Apply minimal cleanups related to the task",
    "Update docs for new behavior",
    "Run lightweight validation commands",
    "Keep changes small and reversible"
  ],
  "preferred_model": "opencode",
  "fallback_model": "ollama",
  "cost_tier": "medium",
  "allowed_actions": [
    "read_files",
    "write_files",
    "run_py_compile",
    "update_docs"
  ],
  "requires_approval_for": [
    "delete_files",
    "rename_files",
    "package_installs",
    "deployments",
    "git_push"
  ],
  "inputs": [
    "changed_files",
    "lint_or_compile_output",
    "docs_requirements"
  ],
  "outputs": [
    "cleanup_patch",
    "updated_docs",
    "validation_output"
  ],
  "validation_expectations": [
    "No unrelated churn is introduced",
    "Validation commands pass for touched modules"
  ],
  "handoff_to": [
    "reviewer"
  ],
  "safety_notes": [
    "Avoid large formatting sweeps",
    "Keep cleanup tightly scoped to the feature"
  ]
}
